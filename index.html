<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatToEat - 智慧美食決策器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* ==================== 1. 網頁視覺排版 (CSS) ==================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f6f9;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 30px 0;
        }
        .card {
            background: #ffffff;
            padding: 35px 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            width: 90%;
            max-width: 450px;
            margin-bottom: 20px;
        }
        h2 {
            color: #2b2b2b;
            font-size: 1.6rem;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 25px;
        }
        /* 大型圖標顯示區塊 */
        .icon-box {
            font-size: 80px;
            color: #ff6b6b;
            margin: 20px auto;
            height: 120px;
            width: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff5f5;
            border-radius: 50%;
            border: 3px dashed #ffe3e3;
        }
        /* 電子抽籤機快速旋轉與震動的 CSS 動畫 */
        .spinning {
            animation: slotSpin 0.12s linear infinite;
        }
        @keyframes slotSpin {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 0.7; color: #ff6b6b; }
            50% { transform: translateY(-8px) scale(0.95) rotate(5deg); color: #4ecdc4; }
            100% { transform: translateY(0) scale(1) rotate(0deg); opacity: 0.7; color: #fca311; }
        }
        h3 {
            font-size: 1.4rem;
            color: #333;
            margin: 15px 0;
            min-height: 35px;
        }
        /* API 附加資訊區塊 */
        .info-text {
            background: #f8f9fa;
            border-left: 4px solid #fca311;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            min-height: 50px;
            margin: 20px 0;
            text-align: left;
            color: #555;
            line-height: 1.4;
        }
        /* 按鈕視覺設計與狀態控制 */
        button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .btn-start { background: #4ecdc4; color: white; }
        .btn-start:hover:not(:disabled) { background: #3ebcb4; transform: translateY(-2px); }
        
        .btn-save { background: #ff6b6b; color: white; }
        .btn-save:hover:not(:disabled) { background: #fa5252; transform: translateY(-2px); }
        
        button:disabled {
            background: #ced4da !important;
            color: #6c757d !important;
            cursor: not-allowed;
            transform: none !important;
        }
        #msg {
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 10px;
            height: 18px;
        }

        /* 底口袋清單與歷史紀錄的容器外框 */
        .sub-box {
            background: #ffffff;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 90%;
            max-width: 450px;
            text-align: left;
            margin-bottom: 20px;
        }
        .sub-box h4 {
            margin-bottom: 12px;
            color: #333;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        .input-group input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
        }
        .input-group button {
            width: auto;
            margin: 0;
            padding: 10px 15px;
            background: #fca311;
            color: white;
            font-size: 0.9rem;
        }
        .fav-list {
            list-style: none;
            max-height: 120px;
            overflow-y: auto;
        }
        .fav-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 0.85rem;
            color: #444;
        }
        .btn-del {
            background: none;
            color: #aaa;
            padding: 0;
            margin: 0;
            width: auto;
            font-size: 0.9rem;
        }
        .btn-del:hover { color: #ff6b6b; }

        /* ==================== 新增：歷史紀錄表格樣式 ==================== */
        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            margin-top: 5px;
        }
        .history-table th {
            background: #f1f3f5;
            color: #495057;
            text-align: left;
            padding: 8px;
            font-weight: 600;
            border-bottom: 2px solid #dee2e6;
        }
        .history-table td {
            padding: 8px;
            border-bottom: 1px solid #eee;
            color: #444;
            vertical-align: middle;
        }
        .status-badge {
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }
        .status-wait { background: #fff3cd; color: #856404; }
        .status-done { background: #d4edda; color: #155724; }
    </style>
</head>
<body>

    <div class="card">
        <h2>今天吃什麼？</h2>
        <div class="subtitle">智慧美食決策與飲食記錄器</div>
        
        <div class="icon-box">
            <i id="food-icon" class="fa-solid fa-cookie-bite"></i>
        </div>
        
        <h3 id="food-name">命運轉盤準備就緒</h3>
        
        <div class="info-text">
            <strong style="color: #fca311;"><i class="fa-solid fa-quote-left"></i> 用餐小語：</strong>
            <span id="api-info">點擊開始抽籤，解鎖今日用餐指南。</span>
        </div>
        
        <button class="btn-start" id="btn-spin" onclick="spinFood()">
            <i class="fa-solid fa-dice"></i> 開始抽籤
        </button>
        <button class="btn-save" id="btn-confirm" onclick="saveToSheet()" disabled>
            <i class="fa-solid fa-cloud-arrow-up"></i> 確認吃這個，記錄下來！
        </button>
        
        <p id="msg"></p>
    </div>

    <div class="sub-box">
        <h4><i class="fa-solid fa-heart" style="color: #ff6b6b;"></i> 我的常吃口袋清單</h4>
        <div class="input-group">
            <input type="text" id="custom-food-input" placeholder="例：巷口乾麵、火雞肉飯..." maxlength="15">
            <button onclick="addCustomFood()"><i class="fa-solid fa-plus"></i> 新增</button>
        </div>
        <ul class="fav-list" id="fav-list-container">
            </ul>
    </div>

    <div class="sub-box">
        <h4><i class="fa-solid fa-clock-rotate-left" style="color: #4ecdc4;"></i> 最近抽籤歷史紀錄 (最新5筆)</h4>
        <table class="history-table">
            <thead>
                <tr>
                    <th>時間</th>
                    <th>抽中食物</th>
                    <th>雲端狀態</th>
                </tr>
            </thead>
            <tbody id="history-list-container">
                </tbody>
        </table>
    </div>

    <script>
        // ==================== 2. 業務邏輯與資料串接 (JavaScript) ====================

        // 預設核心美食資料庫（20種組合）
        const defaultFoods = [
            { name: "台式滷肉飯", icon: "fa-bowl-rice" },
            { name: "日式拉麵", icon: "fa-bowl-food" },
            { name: "川味麻辣鍋", icon: "fa-pepper-hot" },
            { name: "美味鮮魚料理", icon: "fa-fish" },
            { name: "熱炒海鮮大餐", icon: "fa-shrimp" },
            { name: "美式經典漢堡", icon: "fa-burger" },
            { name: "義式披薩", icon: "fa-pizza-slice" },
            { name: "美式炸雞腿", icon: "fa-drumstick-bite" },
            { name: "街頭香脆熱狗堡", icon: "fa-hotdog" },
            { name: "歐式起司拼盤", icon: "fa-cheese" },
            { name: "培根蛋早午餐", icon: "fa-bacon" },
            { name: "法式長棍麵包", icon: "fa-bread-slice" },
            { name: "健康鮮蔬沙拉", icon: "fa-carrot" },
            { name: "季節鮮果拼盤", icon: "fa-apple-whole" },
            { name: "夏日清涼冰淇淋", icon: "fa-ice-cream" },
            { name: "精緻鮮奶油蛋糕", icon: "fa-cake-candles" },
            { name: "巧克力碎片餅乾", icon: "fa-cookie-bite" },
            { name: "香醇熱咖啡", icon: "fa-mug-hot" },
            { name: "微醺浪漫紅酒", icon: "fa-wine-glass" },
            { name: "今天吃大餐", icon: "fa-utensils" }
        ];

        // 從瀏覽器 LocalStorage 載入歷史與常吃資料
        let customFoods = JSON.parse(localStorage.getItem('myCustomFoods')) || [];
        let drawHistory = JSON.parse(localStorage.getItem('myDrawHistory')) || [];

        // ⚠️ 關鍵步驟：完成 Google 部署後，請將 Web App 網址貼在下方引號內
        const gasUrl = "https://script.google.com/macros/s/AKfycbyVrngSLEiIUU5M5bURbz8Tq--ehOtI-_BoPBUUGqLVWV6BQm7OtyqxUWAq-JEBkumn/exec"; 

        // 全域變數，用來儲存當前抽中的最新結果
        let selectedData = { name: "", icon: "", quote: "" };

        // 網頁開啟時，自動初始化渲染常吃與歷史紀錄畫面
        renderCustomFoods();
        renderHistory();

        /**
         * 功能一：處理抽籤動態效果、呼叫免 Key API，並寫入最近歷史紀錄
         */
        async function spinFood() {
            const iconEl = document.getElementById('food-icon');
            const nameEl = document.getElementById('food-name');
            const infoEl = document.getElementById('api-info');
            const btnSpin = document.getElementById('btn-spin');
            const btnConfirm = document.getElementById('btn-confirm');
            const msgEl = document.getElementById('msg');
            
            const totalPool = defaultFoods.concat(customFoods);

            btnSpin.disabled = true;
            btnConfirm.disabled = true;
            iconEl.classList.add('spinning');
            nameEl.textContent = "電子抽籤機滾動中...";
            infoEl.textContent = "正在向宇宙接收大數據建議...";
            msgEl.textContent = "";

            await new Promise(resolve => setTimeout(resolve, 1500));
            iconEl.classList.remove('spinning');

            const result = totalPool[Math.floor(Math.random() * totalPool.length)];
            
            iconEl.className = `fa-solid ${result.icon}`;
            nameEl.textContent = result.name;

            try {
                const apiResponse = await fetch('https://dummyjson.com/quotes/random');
                if (!apiResponse.ok) throw new Error();
                const apiData = await apiResponse.json();
                infoEl.textContent = `"${apiData.quote}" — ${apiData.author}`;
            } catch (e) {
                infoEl.textContent = "好好吃飯，就是對自己最好的照顧！";
            }

            selectedData = {
                name: result.name,
                icon: result.icon,
                quote: infoEl.textContent
            };

            // 【新增邏輯】產生當前時間並推入歷史紀錄數組（只保留最新5筆）
            const now = new Date();
            const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
            
            drawHistory.unshift({
                time: timeStr,
                name: result.name,
                icon: result.icon,
                isSaved: false // 預設剛抽出來，還沒有按確認儲存上雲端
            });

            if (drawHistory.length > 5) drawHistory.pop(); // 超過 5 筆就拿掉最舊的
            localStorage.setItem('myDrawHistory', JSON.stringify(drawHistory)); // 存檔
            renderHistory(); // 更新表格畫面

            btnSpin.disabled = false;
            btnConfirm.disabled = false;
        }

        /**
         * 功能二：發送 POST 請求至 GAS，並動態將歷史紀錄表格狀態改為「已同步」
         */
        async function saveToSheet() {
            if (gasUrl === "YOUR_GAS_WEB_APP_URL") {
                alert("未偵測到後端網址！請先依教學完成 GAS 部署並填入 gasUrl 變數中。");
                return;
            }
            
            const msgEl = document.getElementById('msg');
            const btnConfirm = document.getElementById('btn-confirm');
            
            btnConfirm.disabled = true; 
            msgEl.style.color = "#fca311";
            msgEl.textContent = "⏳ 正在傳送至雲端試算表...";

            try {
                const response = await fetch(gasUrl, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(selectedData),
                    redirect: "follow" 
                });

                const resText = await response.json();

                if (resText.result === "success") {
                    msgEl.style.color = "#2b9348";
                    msgEl.textContent = "✅ 記錄成功！已成功寫入試算表第一列。";
                    
                    // 【新增邏輯】將歷史紀錄陣列中的最新一筆資料，狀態改為已同步
                    if(drawHistory.length > 0) {
                        drawHistory[0].isSaved = true;
                        localStorage.setItem('myDrawHistory', JSON.stringify(drawHistory));
                        renderHistory(); // 重新渲染表格， badge 會變綠色
                    }
                } else {
                    throw new Error(resText.error);
                }
            } catch (err) {
                console.error(err);
                msgEl.style.color = "#e63946";
                msgEl.textContent = "❌ 寫入失敗，請檢查 GAS 權限。";
                btnConfirm.disabled = false;
            }
        }

        /**
         * 功能三：新增自訂常吃食物
         */
        function addCustomFood() {
            const inputEl = document.getElementById('custom-food-input');
            const foodName = inputEl.value.trim();

            if (foodName === "") return alert("請輸入食物名稱！");

            const isDuplicate = customFoods.some(item => item.name === foodName);
            if (isDuplicate) return alert("這個美食已經在清單中囉！");

            customFoods.push({ name: foodName, icon: "fa-star" });
            localStorage.setItem('myCustomFoods', JSON.stringify(customFoods));
            inputEl.value = "";
            renderCustomFoods();
        }

        /**
         * 功能四：刪除自訂常吃食物
         */
        function deleteCustomFood(index) {
            customFoods.splice(index, 1);
            localStorage.setItem('myCustomFoods', JSON.stringify(customFoods));
            renderCustomFoods();
        }

        /**
         * 功能五：渲染口袋清單 UI
         */
        function renderCustomFoods() {
            const container = document.getElementById('fav-list-container');
            container.innerHTML = "";

            if (customFoods.length === 0) {
                container.innerHTML = `<li class="fav-item" style="color:#999; justify-content:center;">目前無自訂食物。</li>`;
                return;
            }

            customFoods.forEach((item, index) => {
                const li = document.createElement('li');
                li.className = "fav-item";
                li.innerHTML = `
                    <span><i class="fa-solid fa-star" style="color:#fca311; margin-right:5px;"></i> ${item.name}</span>
                    <button class="btn-del" onclick="deleteCustomFood(${index})"><i class="fa-solid fa-trash-can"></i></button>
                `;
                container.appendChild(li);
            });
        }

        /**
         * 【新增功能六】：動態渲染最近抽籤歷史紀錄表格 UI
         */
        function renderHistory() {
            const container = document.getElementById('history-list-container');
            container.innerHTML = ""; // 清空舊表格

            if (drawHistory.length === 0) {
                container.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#999; padding: 15px 0;">尚無抽籤紀錄，快點擊開始抽籤吧！</td></tr>`;
                return;
            }

            // 跑迴圈生成表格列 (tr)
            drawHistory.forEach(item => {
                const tr = document.createElement('tr');
                
                // 根據是否點擊過確認按鈕，給予不同的精美狀態標籤
                const statusBadge = item.isSaved 
                    ? `<span class="status-badge status-done"><i class="fa-solid fa-cloud-check"></i> 已同步</span>`
                    : `<span class="status-badge status-wait"><i class="fa-solid fa-triangle-exclamation"></i> 未記錄</span>`;
                
                tr.innerHTML = `
                    <td><i class="fa-regular fa-clock" style="color:#aaa;"></i> ${item.time}</td>
                    <td><i class="fa-solid ${item.icon}" style="color:#ff6b6b; width: 18px; margin-right:4px;"></i> <strong>${item.name}</strong></td>
                    <td>${statusBadge}</td>
                `;
                container.appendChild(tr);
            });
        }
    </script>
</body>
</html>
