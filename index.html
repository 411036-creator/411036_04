            const activeCategory = document.querySelector('input[name="foodCategory"]:checked').value;
            
            // 組合抽籤池：【該類別的網路大數據】 + 【該類別的使用者常吃清單】
            const userCategoryFoods = customFoods.filter(f => f.category === activeCategory);
            const totalPool = foodDatabase[activeCategory].concat(userCategoryFoods);

            // 動畫狀態
            btnSpin.disabled = true; btnConfirm.disabled = true;
            iconEl.classList.add('spinning');
            nameEl.textContent = "資料庫快篩抽籤中...";
            infoEl.textContent = "正在向宇宙接收大數據建議...";
            document.getElementById('msg').textContent = "";

            await new Promise(r => setTimeout(r, 1200));
            iconEl.classList.remove('spinning');

            // 隨機抽選
            const result = totalPool[Math.floor(Math.random() * totalPool.length)];
            iconEl.className = `fa-solid ${result.icon}`;
            nameEl.textContent = result.name;

            // 背景取得 API 語錄
            try {
                const apiRes = await fetch('https://dummyjson.com/quotes/random');
                const apiData = await apiRes.json();
                infoEl.textContent = `"${apiData.quote}" — ${apiData.author}`;
            } catch (e) {
                infoEl.textContent = "好好吃飯，就是對自己最好的照顧！";
            }

            // 準備上傳用資料與寫入歷史
            selectedData = { name: result.name, icon: result.icon, quote: infoEl.textContent };
            
            const now = new Date();
            const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            drawHistory.unshift({ time: timeStr, name: result.name, icon: result.icon, isSaved: false });
            if (drawHistory.length > 5) drawHistory.pop();
            localStorage.setItem('myDrawHistory', JSON.stringify(drawHistory));
            renderHistory();

            btnSpin.disabled = false; btnConfirm.disabled = false;
        }

        /**
         * 功能二：寫入 GAS 試算表
         */
        async function saveToSheet() {
            if (gasUrl === "YOUR_GAS_WEB_APP_URL") return alert("請先填入 GAS 網址！");
            const msgEl = document.getElementById('msg');
            const btnConfirm = document.getElementById('btn-confirm');
            
            btnConfirm.disabled = true; 
            msgEl.style.color = "#fca311"; msgEl.textContent = "⏳ 傳送至雲端...";

            try {
                const response = await fetch(gasUrl, {
                    method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(selectedData), redirect: "follow" 
                });
                const resText = await response.json();
                if (resText.result === "success") {
                    msgEl.style.color = "#2b9348"; msgEl.textContent = "✅ 已成功寫入試算表！";
                    if(drawHistory.length > 0) {
                        drawHistory[0].isSaved = true;
                        localStorage.setItem('myDrawHistory', JSON.stringify(drawHistory));
                        renderHistory();
                    }
                } else throw new Error();
            } catch (err) {
                msgEl.style.color = "#e63946"; msgEl.textContent = "❌ 寫入失敗，請檢查權限。";
                btnConfirm.disabled = false;
            }
        }

        /**
         * 功能三：新增分門別類的常吃食物
         */
        function addCustomFood() {
            const inputEl = document.getElementById('custom-food-input');
            const catEl = document.getElementById('custom-cat');
            const foodName = inputEl.value.trim();
            const category = catEl.value;

            if (!foodName) return alert("請輸入食物名稱！");
            if (customFoods.some(item => item.name === foodName)) return alert("這項美食已經在清單中囉！");

            // 自訂食物一律給星星圖標，並儲存其類別
            customFoods.push({ name: foodName, icon: "fa-star", category: category });
            localStorage.setItem('myCustomFoods', JSON.stringify(customFoods));
            
            inputEl.value = "";
            renderCustomFoods();
        }

        function deleteCustomFood(index) {
            customFoods.splice(index, 1);
            localStorage.setItem('myCustomFoods', JSON.stringify(customFoods));
            renderCustomFoods();
        }

        /**
         * 功能四：渲染常吃清單 UI (加上類別徽章)
         */
        function renderCustomFoods() {
            const container = document.getElementById('fav-list-container');
            container.innerHTML = "";
            if (customFoods.length === 0) {
                container.innerHTML = `<li class="fav-item" style="color:#999; justify-content:center;">目前無自訂食物。</li>`; return;
            }

            const catMap = { 'main': {text: '主食', class: 'bg-main'}, 'dessert': {text: '甜點', class: 'bg-dessert'}, 'beverage': {text: '飲料', class: 'bg-bev'} };

            customFoods.forEach((item, index) => {
                const badgeInfo = catMap[item.category] || catMap['main'];
                const li = document.createElement('li');
                li.className = "fav-item";
                li.innerHTML = `
                    <span>
                        <span class="cat-badge ${badgeInfo.class}">${badgeInfo.text}</span>
                        <i class="fa-solid fa-star" style="color:#fca311; margin-right:4px;"></i> ${item.name}
                    </span>
                    <button class="btn-del" onclick="deleteCustomFood(${index})"><i class="fa-solid fa-trash-can"></i></button>
                `;
                container.appendChild(li);
            });
        }

        function renderHistory() {
            const container = document.getElementById('history-list-container');
            container.innerHTML = "";
            if (drawHistory.length === 0) {
                container.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#999; padding: 10px;">尚無紀錄</td></tr>`; return;
            }
            drawHistory.forEach(item => {
                const badge = item.isSaved ? `<span class="status-badge status-done"><i class="fa-solid fa-check"></i></span>` : `<span class="status-badge status-wait"><i class="fa-solid fa-xmark"></i></span>`;
                container.innerHTML += `<tr>
                    <td>${item.time}</td>
                    <td><i class="fa-solid ${item.icon}" style="color:#ff6b6b; margin-right:4px;"></i> <strong>${item.name}</strong></td>
                    <td>${badge}</td>
                </tr>`;
            });
        }
    </script>
</body>
</html>
